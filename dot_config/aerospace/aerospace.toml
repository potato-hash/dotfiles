# AeroSpace – omarchy-inspired keybindings with Catppuccin Mocha borders
# Keybindings mirror omarchy's tiling-v2.conf where applicable
# SUPER (omarchy) = alt (AeroSpace) since cmd is reserved for macOS

config-version = 2
start-at-login = true

after-startup-command = [
  # JankyBorders: Catppuccin Mocha gradient (mauve → pink)
  'exec-and-forget borders active_color="gradient(top_left=0xffcba6f7,bottom_right=0xfff5c2e7)" inactive_color=0xff313244 width=5.0 style=round hidpi=on',
]

# Normalizations (keep layout tree tidy)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ── Gaps ──────────────────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# ── Main Keybindings ──────────────────────────────────────────────────────────
# Mapping: omarchy SUPER → alt
[mode.main.binding]

# Window management
# omarchy: SUPER+W = close window
alt-w = 'close'

# omarchy: SUPER+J = toggle split
alt-j = 'layout tiles horizontal vertical'

# omarchy: SUPER+T = toggle floating/tiling
alt-t = 'layout floating tiling'

# omarchy: SUPER+F = fullscreen
alt-f = 'fullscreen'

# omarchy: SUPER+L = toggle layout
alt-l = 'layout accordion tiles'

# Focus (omarchy: SUPER+arrows)
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'

# Swap windows (omarchy: SUPER+SHIFT+arrows)
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'

# Resize (omarchy: SUPER+minus/equal)
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspaces (omarchy: SUPER+1-9)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move to workspace (omarchy: SUPER+SHIFT+1-9)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Workspace navigation (omarchy: SUPER+TAB / SUPER+SHIFT+TAB)
alt-tab = 'workspace next'
alt-shift-tab = 'workspace prev'

# Workspace back-and-forth (omarchy: SUPER+CTRL+TAB)
alt-ctrl-tab = 'workspace-back-and-forth'

# Move workspace to monitor (omarchy: SUPER+SHIFT+ALT+arrows)
alt-shift-ctrl-left = 'move-workspace-to-monitor --wrap-around prev'
alt-shift-ctrl-right = 'move-workspace-to-monitor --wrap-around next'

# App launchers (omarchy: SUPER+SHIFT+key)
alt-shift-enter = ['exec-and-forget open -a Ghostty']
alt-shift-b = ['exec-and-forget open -a Zen']
alt-shift-n = ['exec-and-forget open -a Zed']
alt-shift-o = ['exec-and-forget open -a Obsidian']

# Service mode (for less common operations)
alt-shift-semicolon = 'mode service'

# ── Service Mode ──────────────────────────────────────────────────────────────
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join with direction (create splits)
left = ['join-with left', 'mode main']
down = ['join-with down', 'mode main']
up = ['join-with up', 'mode main']
right = ['join-with right', 'mode main']

# ── Window Rules ──────────────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['move-node-to-workspace 5']

# Prefix key (Ctrl+Space — mobile-friendly for Blink Shell)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse support (essential for mobile touch interaction)
set -g mouse on

# Large scrollback buffer
set -g history-limit 50000

# 256 color support
set -g default-terminal "screen-256color"

# Reduce escape time (helps with responsiveness over SSH)
set -sg escape-time 10

# Increase display time for messages
set -g display-time 2000

# Start window numbering at 1 (easier to reach on mobile keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Prefix key (Ctrl+Space — mobile-friendly for Blink Shell)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse support (essential for mobile touch interaction)
set -g mouse on

# Large scrollback buffer
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"

# Reduce escape time (helps with responsiveness over SSH/mosh)
set -sg escape-time 10

# Increase display time for messages
set -g display-time 2000

# Start window numbering at 1 (easier to reach on mobile keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring (no visual bell)
setw -g monitor-activity on
set -g visual-activity off

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Quick reload
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Catppuccin Mocha Theme ──────────────────────────────────────────────────
mocha_base="#1e1e2e"
mocha_mantle="#181825"
mocha_crust="#11111b"
mocha_surface0="#313244"
mocha_surface1="#45475a"
mocha_overlay0="#6c7086"
mocha_text="#cdd6f4"
mocha_subtext0="#a6adc8"
mocha_pink="#f5c2e7"
mocha_mauve="#cba6f7"
mocha_green="#a6e3a1"
mocha_red="#f38ba8"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#{mocha_mantle},fg=#{mocha_text}"

# Left: session name
set -g status-left "#[bg=#{mocha_pink},fg=#{mocha_crust},bold] #S #[bg=default] "
set -g status-left-length 30

# Right: date and time (compact for mobile)
set -g status-right "#[fg=#{mocha_subtext0}]%b %d  %H:%M "
set -g status-right-length 30

# Window tabs
set -g window-status-format "#[fg=#{mocha_overlay0}] #I:#W "
set -g window-status-current-format "#[fg=#{mocha_pink},bold] #I:#W "
set -g window-status-activity-style "fg=#{mocha_mauve}"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#{mocha_surface0}"
set -g pane-active-border-style "fg=#{mocha_pink}"

# Message styling
set -g message-style "bg=#{mocha_surface0},fg=#{mocha_text}"
set -g message-command-style "bg=#{mocha_surface0},fg=#{mocha_text}"

# Mode styling (copy mode, etc)
setw -g mode-style "bg=#{mocha_surface1},fg=#{mocha_pink}"

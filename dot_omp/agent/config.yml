# OMP v17.0.3 baseline verified 2026-07-17: config load, advisor, prewalk,
# Hindsight/xd://, and RPC smoke tests passed.
symbolPreset: nerd
theme:
  dark: titanium
setupVersion: 1
modelRoles:
  default: openai-codex/gpt-5.6-sol:medium
  smol: openai-codex/gpt-5.6-luna:low
  slow: openai-codex/gpt-5.6-sol:xhigh
  plan: openai-codex/gpt-5.6-sol:xhigh
  task: openai-codex/gpt-5.6-luna:medium
  advisor: openai-codex/gpt-5.6-terra:high
  designer: openai-codex/gpt-5.6-sol:high
  commit: openai-codex/gpt-5.6-luna:minimal
  tiny: openai-codex/gpt-5.6-luna:minimal
defaultThinkingLevel: medium
prewalk:
  enabled: true
advisor:
  enabled: true
  subagents: true
  syncBacklog: '1'
autoResume: false
features:
  unexpectedStopDetection: true
branchSummary:
  enabled: true
contextPromotion:
  enabled: true
compaction:
  thresholdPercent: 80
  handoffSaveToDisk: true
memory:
  backend: hindsight
hindsight:
  polyphonicRecall: true
  enhancedRecall: true
  llmMode: smol
  apiUrl: http://tower.humpback-solfege.ts.net:8888
  bankId: default
  scoping: global
  autoRecall: true
  autoRetain: true
  retainContext: omp
  recallBudget: high
  recallMaxTokens: 4096
  recallTypes:
  - observation
  - world
  - experience
read:
  summarize:
    prose: true
lsp:
  formatOnWrite: true
bash:
  autoBackground:
    enabled: true
bashInterceptor:
  enabled: true
inspect_image:
  enabled: true
checkpoint:
  enabled: true
vault:
  enabled: true
github:
  enabled: true
plan:
  defaultOnStartup: true
task:
  eager: preferred
  isolation:
    mode: auto
providers:
  webSearch: kagi
secrets:
  enabled: true
